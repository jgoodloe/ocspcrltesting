[pytest]
# Never let a single test hang the run. On timeout, method=thread dumps the
# stack of every thread (including any live subprocess-reader threads) so a
# hang is diagnosable from the log rather than silently eating the CI budget.
timeout = 90
timeout_method = thread
# Backstop for a whole-session or at-exit hang that no single test owns:
# faulthandler dumps all thread tracebacks after this many seconds.
faulthandler_timeout = 180
