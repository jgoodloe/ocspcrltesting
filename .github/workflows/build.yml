name: build

on:
  push:
    # main + version tags publish the release images (`latest`, semver).
    # Feature branches publish a per-branch preview image so a work-in-progress
    # branch can be deployed with `docker compose up` before it merges.
    branches: [main, "claude/**"]
    tags: ["v*"]
  pull_request:
    branches: [main]
  # Weekly canary run (#50): catches dependency/toolchain drift during quiet
  # periods so the next real commit doesn't inherit a mystery failure.
  # Scheduled runs execute the test job only — see the image job's `if`.
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

concurrency:
  # One in-flight run per ref. Cancel superseded feature-branch/PR runs, but
  # never interrupt a release publish (main or a version tag) mid-push.
  group: build-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/v') }}

# Least privilege by default; jobs that publish (image, release) declare
# their own write scopes.
permissions:
  contents: read

jobs:
  test:
    name: Backend tests + frontend build (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.14 matches the Docker image's base (python:3.14-slim, #51) so the
        # runtime the image ships is actually exercised by tests; 3.10 holds
        # the documented floor for source installs.
        python: ["3.10", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Run backend tests
        # Hard job-level cap plus SIGABRT (via timeout -s ABRT) so a whole-run
        # or at-exit hang dumps every thread's traceback under faulthandler
        # instead of silently eating the CI budget. pytest-timeout (configured
        # in pytest.ini) catches per-test hangs with a thread dump.
        timeout-minutes: 10
        run: timeout -s ABRT 300 python -X faulthandler -m pytest backend/tests -q

      # Kept in lockstep with the Dockerfile's node base image (#52) so the
      # frontend build CI validates is the one the image actually uses.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (typecheck + bundle)
        working-directory: frontend
        run: |
          npm ci
          npm run build

  image:
    name: Prebuild container image (GHCR)
    needs: test
    # Publish from pushes to main, version tags, and feature branches (plus
    # manual dispatch) — never from PRs (a fork PR's GITHUB_TOKEN cannot write
    # packages, and we do not want to publish images built from untrusted PR
    # code) and never from the weekly scheduled canary run, which only tests.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # For the GitHub-signed provenance attestation (#78).
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Feature branches publish a preview image tagged with the branch name,
      # with the `claude/` session prefix stripped and any remaining slashes
      # turned into dashes. That makes branch `claude/test-platform-enhancements-be455f`
      # pullable as `ghcr.io/<repo>:test-platform-enhancements-be455f` on any host.
      # Skipped for tag pushes (github.ref is refs/tags/*), which use semver tags.
      - name: Compute branch image tag
        id: branch
        if: startsWith(github.ref, 'refs/heads/')
        run: |
          ref="${GITHUB_REF#refs/heads/}"
          ref="${ref#claude/}"
          ref="${ref//\//-}"
          echo "tag=$ref" >> "$GITHUB_OUTPUT"

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=${{ steps.branch.outputs.tag }},enable=${{ steps.branch.outputs.tag != '' }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          # amd64 for servers/NUCs, arm64 for Pi/ARM homelab hosts. Both arches
          # are always built — including for feature-branch preview images — so a
          # published tag resolves on either host and never yields a
          # "no matching manifest for linux/amd64" pull error.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Supply-chain metadata (#78): BuildKit attaches SLSA provenance and
          # an SPDX SBOM to the image manifest, so `docker buildx imagetools
          # inspect` (and scanners) can see exactly what went in and how.
          provenance: mode=max
          sbom: true

      # GitHub-signed provenance for release-grade refs only (#78) — verify
      # with: gh attestation verify oci://ghcr.io/<repo>:<tag> --owner jgoodloe
      # Branch preview images are throwaway and skip this.
      - name: Attest build provenance
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  release:
    name: Publish GitHub Release
    # Automated release on version tags (#44): the release body is the tag's
    # section from CHANGELOG.md (the curated source of truth), plus the GHCR
    # pull line for the image this same run just published. Runs only after
    # the image publish succeeds so a release never points at a missing tag.
    needs: image
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # The footer/API version comes from backend/app/__init__.py; fail the
      # release loudly if the tag was pushed without bumping it, so a stale
      # version string can never ship (it did for v1.1.0/v1.2.0).
      - name: Check version constant matches tag
        run: |
          pkg=$(python3 -c "import re; print(re.search(r'__version__ = \"([^\"]+)\"', open('backend/app/__init__.py').read()).group(1))")
          if [ "v$pkg" != "$GITHUB_REF_NAME" ]; then
            echo "::error::backend/app/__init__.py has __version__=$pkg but the tag is $GITHUB_REF_NAME — bump the constant and re-tag"
            exit 1
          fi

      - name: Extract release notes from CHANGELOG.md
        run: |
          # Grab everything between "## <tag>" (e.g. "## v1.0.0 — ...") and
          # the next "## " heading. Fail loudly if the section is missing so
          # a tag can't ship with an empty release body.
          awk -v ver="$GITHUB_REF_NAME" '
            !found && index($0, "## " ver) == 1 {
              # Reject prefix matches: after "## <ver>" the heading must end
              # or continue with something that is not more version digits
              # (so tag v1.0 cannot match the "## v1.0.0" section).
              rest = substr($0, length("## " ver) + 1)
              if (rest == "" || rest !~ /^[0-9.]/) { found = 1; next }
            }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if ! grep -q '[^[:space:]]' release-notes.md; then
            echo "::error::No CHANGELOG.md section found for $GITHUB_REF_NAME" >&2
            exit 1
          fi
          {
            echo ""
            echo "---"
            echo ""
            echo "Container image for this release:"
            echo ""
            echo '```'
            echo "docker pull ghcr.io/$GITHUB_REPOSITORY:${GITHUB_REF_NAME#v}"
            echo '```'
          } >> release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          body_path: release-notes.md
