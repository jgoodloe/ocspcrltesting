# CodeQL static analysis (#42): Python (backend, ocsp_tester, cli.py) and
# JavaScript/TypeScript (frontend). Runs on pushes and PRs to main plus a
# weekly cron so new queries shipped by GitHub re-scan the existing code.
# Findings land in the repository's Security tab (code scanning alerts).
name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "26 7 * * 2"

# Least privilege at the top; the analyze job declares its own writes.
permissions:
  contents: read

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          languages: ${{ matrix.language }}
          # Both languages analyze without a build; the frontend bundle and
          # pip install are not needed for scanning.
          build-mode: none
          # security-extended (#81): accepts more lower-confidence queries in
          # exchange for deeper security coverage — the right trade for a
          # codebase whose risks are SSRF, subprocess injection, and auth.
          queries: security-extended

      - uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          category: "/language:${{ matrix.language }}"
