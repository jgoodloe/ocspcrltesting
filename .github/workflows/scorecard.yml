# OpenSSF Scorecard (#79): grades this repo's supply-chain posture (token
# permissions, pinned actions, branch protection, dangerous workflow
# patterns, update tooling) on a weekly schedule and on main pushes.
# Findings land in the Security tab; publish_results makes the score public
# at https://securityscorecards.dev/viewer/?uri=github.com/jgoodloe/ocspcrltesting
name: scorecard

on:
  schedule:
    - cron: "19 7 * * 3"
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      # Required by scorecard's publish step (OIDC-signed results).
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload results to code scanning
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: results.sarif
