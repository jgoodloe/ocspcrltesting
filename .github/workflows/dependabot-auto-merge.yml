# Auto-merge green Dependabot minor/patch PRs (#76). Safety comes from the
# main ruleset: --auto only completes the merge once the required status
# checks pass, so a red PR never lands. Majors are excluded — they wait for
# a human (and for coupled families the Dependabot groups in dependabot.yml
# already deliver them as one reviewable PR).
#
# Dependabot-triggered workflows get a read-only GITHUB_TOKEN by default;
# the explicit permissions block restores exactly the two scopes needed.
name: dependabot-auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: dependabot/fetch-metadata@v2
        id: meta

      - name: Enable auto-merge for minor/patch updates
        if: steps.meta.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
