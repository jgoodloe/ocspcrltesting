# Dependabot keeps all four ecosystems current (#41). Minor/patch updates are
# grouped into one weekly PR per ecosystem to keep noise down; security
# advisories always get their own immediate PR regardless of grouping. Every
# PR is validated by the existing test matrix in build.yml.
version: 2
updates:
  # Web backend (FastAPI app + dev/test tooling).
  - package-ecosystem: pip
    directory: "/backend"
    schedule:
      interval: weekly
    groups:
      backend-minor-patch:
        update-types: ["minor", "patch"]

  # Root requirements.txt (CLI / engine dependencies).
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      cli-minor-patch:
        update-types: ["minor", "patch"]

  # React frontend. The react and vite families are peer-coupled — bumping
  # one member alone breaks `npm ci` (e.g. @types/react 19 against
  # @types/react-dom 18, or @vitejs/plugin-react 6 against vite 5) — so they
  # are grouped across ALL update types to always arrive as one coherent PR.
  # A dependency joins the first group it matches, so these precede the
  # catch-all minor/patch group.
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
        update-types: ["major", "minor", "patch"]
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
        update-types: ["major", "minor", "patch"]
      frontend-minor-patch:
        update-types: ["minor", "patch"]

  # Base images in the Dockerfile (node:20-alpine, python:3.12-slim).
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly

  # Action versions in .github/workflows/.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions-minor-patch:
        update-types: ["minor", "patch"]
