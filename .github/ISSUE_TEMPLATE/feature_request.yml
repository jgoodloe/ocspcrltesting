name: Feature request
description: Propose an enhancement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that the tool doesn't support (or makes harder than it should be)?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should happen instead? Sketch the UX/API if you have one in mind.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      multiple: true
      options:
        - Web UI (frontend)
        - REST API (backend)
        - Test engine (ocsp_tester)
        - CLI
        - Deployment / Docker / nginx
        - Documentation
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
