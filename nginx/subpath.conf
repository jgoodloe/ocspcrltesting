# OCSP Testing Web — subpath deployment (https://example.com/ocsp/)
#
# REQUIRED on the app: OCSPWEB_BASE_PATH=/ocsp
# nginx strips the /ocsp prefix; the app rewrites the SPA <base href> and its
# OpenAPI root_path from OCSPWEB_BASE_PATH so every asset, API call and
# WebSocket URL resolves under /ocsp/ with no hardcoded origins in the browser.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    # Normalize /ocsp -> /ocsp/ so relative URLs resolve correctly.
    location = /ocsp {
        return 301 /ocsp/;
    }

    location /ocsp/ {
        # Trailing slash on proxy_pass strips the /ocsp prefix.
        proxy_pass http://app:8000/;
        proxy_http_version 1.1;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header X-Forwarded-Host   $host;
        proxy_set_header X-Forwarded-Prefix /ocsp;

        # WebSocket upgrade (live run stream)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
