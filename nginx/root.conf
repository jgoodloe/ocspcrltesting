# OCSP Testing Web — root deployment (https://ocsp.example.com/)
#
# The app container listens on app:8000. WebSocket upgrade headers are
# required for the live run stream; proxy_buffering must stay off for SSE.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Certificate uploads: keep in sync with OCSPWEB_MAX_UPLOAD_BYTES.
    client_max_body_size 20m;

    # For TLS, terminate here (listen 443 ssl; ssl_certificate ...) and keep
    # X-Forwarded-Proto below so the app generates correct absolute URLs.

    location / {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket upgrade (live run stream)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Long-lived streams (WebSocket/SSE) — do not buffer, do not time out early.
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
