# Alembic configuration for OCSP Testing Web.
#
# The database URL is NOT set here; migrations/env.py reads it from the
# application settings (OCSPWEB_DATABASE_URL, defaulting to SQLite), so a single
# config drives both SQLite (dev/CI) and PostgreSQL (recommended production).

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
